<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Hall - Level 1</title>
    <style>
        body {
            margin: 0;
            background: #111;
            color: #ddd;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            text-align: center;
        }
        canvas {
            border: 4px solid #333;
            image-rendering: pixelated;
            background: #1a0f1f;
        }
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            font-size: 20px;
            text-shadow: 2px 2px 4px #000;
        }
        .title {
            color: #c00;
            text-shadow: 0 0 10px #f00;
        }
    </style>
</head>
<body>
    <div id="ui">
        <span class="title">THE HALL - LEVEL 1</span><br>
        Puntuación: <span id="score">0</span>
    </div>

    <canvas id="game" width="800" height="500"></canvas>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');

        // Variables del jugador
        let player = {
            x: 50,
            y: 300,
            width: 30,
            height: 40,
            velX: 0,
            velY: 0,
            speed: 5,
            jump: -14,
            grounded: false
        };

        let gravity = 0.6;
        let friction = 0.85;
        let keys = {};
        let score = 0;
        let gameOver = false;
        let won = false;

        // Plataformas (x, y, width, height)
        let platforms = [
            {x: 0, y: 450, w: 1200, h: 50},   // suelo principal
            {x: 200, y: 350, w: 150, h: 20},
            {x: 450, y: 280, w: 200, h: 20},
            {x: 750, y: 380, w: 100, h: 20},
            {x: 950, y: 220, w: 150, h: 20},
            {x: 1200, y: 300, w: 100, h: 20},
            {x: 1450, y: 400, w: 300, h: 50}  // plataforma final
        ];

        // Plataforma móvil
        let movingPlatform = {x: 550, y: 200, w: 120, h: 20, dir: 1, speed: 2};

        // Monedas
        let coins = [
            {x: 280, y: 300, r: 10, collected: false},
            {x: 520, y: 220, r: 10, collected: false},
            {x: 820, y: 320, r: 10, collected: false},
            {x: 1020, y: 160, r: 10, collected: false},
            {x: 1300, y: 340, r: 10, collected: false}
        ];

        // Enemigo simple
        let enemy = {
            x: 600,
            y: 410,
            width: 30,
            height: 30,
            velX: 2,
            alive: true
        };

        // Meta
        let goal = {x: 1650, y: 300, w: 20, h: 150};

        // Cámara
        let cameraX = 0;

        // Controles
        window.addEventListener('keydown', e => keys[e.key] = true);
        window.addEventListener('keyup', e => keys[e.key] = false);

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Fondo oscuro con atmósfera de "The Hall"
            ctx.fillStyle = '#1a0f1f';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Suelo lejano (decorativo)
            ctx.fillStyle = '#2a1a2f';
            ctx.fillRect(0, 420, canvas.width, 80);

            // Dibujar plataformas
            ctx.fillStyle = '#555';
            platforms.forEach(p => {
                ctx.fillRect(p.x - cameraX, p.y, p.w, p.h);
                ctx.fillStyle = '#777';
                ctx.fillRect(p.x - cameraX, p.y, p.w, 8); // borde superior
                ctx.fillStyle = '#555';
            });

            // Plataforma móvil
            ctx.fillStyle = '#c33';
            ctx.fillRect(movingPlatform.x - cameraX, movingPlatform.y, movingPlatform.w, movingPlatform.h);

            // Monedas
            ctx.fillStyle = '#ff0';
            coins.forEach(coin => {
                if (!coin.collected) {
                    ctx.beginPath();
                    ctx.arc(coin.x - cameraX, coin.y, coin.r, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = '#ffaa00';
                    ctx.font = '12px Arial';
                    ctx.fillText('★', coin.x - cameraX - 6, coin.y + 5);
                    ctx.fillStyle = '#ff0';
                }
            });

            // Enemigo
            if (enemy.alive) {
                ctx.fillStyle = '#900';
                ctx.fillRect(enemy.x - cameraX, enemy.y, enemy.width, enemy.height);
                ctx.fillStyle = '#f00';
                ctx.fillRect(enemy.x - cameraX + 8, enemy.y + 10, 14, 10); // ojos
            }

            // Meta (bandera)
            ctx.fillStyle = '#0a0';
            ctx.fillRect(goal.x - cameraX, goal.y, goal.w, goal.h);
            ctx.fillStyle = '#0f0';
            ctx.fillRect(goal.x - cameraX, goal.y, 40, 30); // bandera

            // Jugador (estilo simple pero con toque oscuro)
            ctx.fillStyle = '#0af';
            ctx.fillRect(player.x - cameraX, player.y, player.width, player.height);
            // "cabeza"
            ctx.fillStyle = '#fff';
            ctx.fillRect(player.x - cameraX + 8, player.y + 8, 14, 12);

            // Texto de victoria o game over
            if (won) {
                ctx.fillStyle = 'rgba(0,255,0,0.8)';
                ctx.font = '40px Arial';
                ctx.fillText('¡NIVEL COMPLETO!', 180, 220);
            }
            if (gameOver) {
                ctx.fillStyle = 'rgba(255,0,0,0.8)';
                ctx.font = '40px Arial';
                ctx.fillText('GAME OVER', 220, 220);
            }
        }

        function update() {
            if (gameOver || won) return;

            // Movimiento horizontal
            if (keys['ArrowLeft'] || keys['a']) player.velX = -player.speed;
            else if (keys['ArrowRight'] || keys['d']) player.velX = player.speed;
            else player.velX *= friction;

            // Salto
            if ((keys[' '] || keys['ArrowUp'] || keys['w']) && player.grounded) {
                player.velY = player.jump;
                player.grounded = false;
            }

            // Aplicar gravedad
            player.velY += gravity;
            player.x += player.velX;
            player.y += player.velY;

            // Colisión con plataformas
            player.grounded = false;
            platforms.forEach(p => {
                if (
                    player.x < p.x + p.w &&
                    player.x + player.width > p.x &&
                    player.y < p.y + p.h &&
                    player.y + player.height > p.y
                ) {
                    // Colisión desde arriba
                    if (player.velY > 0 && player.y + player.height - player.velY <= p.y) {
                        player.y = p.y - player.height;
                        player.velY = 0;
                        player.grounded = true;
                    }
                    // Colisión desde abajo (opcional)
                    else if (player.velY < 0 && player.y - player.velY >= p.y + p.h) {
                        player.y = p.y + p.h;
                        player.velY = 0;
                    }
                }
            });

            // Colisión con plataforma móvil
            if (
                player.x < movingPlatform.x + movingPlatform.w &&
                player.x + player.width > movingPlatform.x &&
                player.y < movingPlatform.y + movingPlatform.h &&
                player.y + player.height > movingPlatform.y
            ) {
                if (player.velY > 0 && player.y + player.height - player.velY <= movingPlatform.y) {
                    player.y = movingPlatform.y - player.height;
                    player.velY = 0;
                    player.grounded = true;
                    player.x += movingPlatform.speed * movingPlatform.dir * 0.5; // se mueve con la plataforma
                }
            }

            // Actualizar plataforma móvil
            movingPlatform.y += movingPlatform.speed * movingPlatform.dir;
            if (movingPlatform.y <= 100 || movingPlatform.y >= 300) movingPlatform.dir *= -1;

            // Colisión con monedas
            coins.forEach(coin => {
                if (!coin.collected) {
                    let dx = (player.x + player.width/2) - coin.x;
                    let dy = (player.y + player.height/2) - coin.y;
                    if (dx*dx + dy*dy < (player.width/2 + coin.r)**2) {
                        coin.collected = true;
                        score += 100;
                        scoreEl.textContent = score;
                    }
                }
            });

            // Colisión con enemigo
            if (enemy.alive) {
                if (
                    player.x < enemy.x + enemy.width &&
                    player.x + player.width > enemy.x &&
                    player.y < enemy.y + enemy.height &&
                    player.y + player.height > enemy.y
                ) {
                    gameOver = true;
                }

                // Movimiento enemigo
                enemy.x += enemy.velX;
                if (enemy.x <= 550 || enemy.x >= 850) enemy.velX *= -1;
            }

            // Colisión con meta
            if (
                player.x + player.width > goal.x &&
                player.x < goal.x + goal.w &&
                player.y + player.height > goal.y &&
                player.y < goal.y + goal.h
            ) {
                won = true;
            }

            // Límites del mapa
            if (player.y > 600) gameOver = true;
            if (player.x < 0) player.x = 0;

            // Cámara sigue al jugador
            cameraX = Math.max(0, player.x - 300);
            if (cameraX > 1400) cameraX = 1400; // límite derecho aproximado
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // Reiniciar con R
        window.addEventListener('keydown', e => {
            if ((gameOver || won) && e.key === 'r') {
                location.reload();
            }
        });

        gameLoop();
    </script>

    <p style="margin-top:10px; color:#666;">
        Controles: ← → mover | Espacio saltar<br>
        Recoge las estrellas ★ | Llega a la bandera verde | ¡Evita el enemigo rojo!<br>
        Presiona <strong>R</strong> para reiniciar al morir o ganar.
    </p>
</body>
</html>
