<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tutorial - The Tower Game</title>
    <style>
        /* TU CSS ORIGINAL */
        @font-face {
            font-family: 'GeometryDash';
            src: url('Letras.otf') format('opentype');
        }

        * {
            text-decoration: none;
            font-family: 'GeometryDash', sans-serif;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: white;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .menu-container {
            text-align: center;
            z-index: 10;
            background: rgba(0, 0, 0, 0.5);
            padding: 30px;
            border-radius: 20px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            width: 90%;
            max-width: 600px;
        }

        .title {
            font-size: 2.5rem;
            color: #fff;
            text-shadow: 0 5px 0 #2980b9, 0 10px 20px rgba(0,0,0,0.5);
            margin-bottom: 10px;
            animation: float 3s ease-in-out infinite;
        }

        /* ESTILOS DEL JUEGO */
        #gameCanvas {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            width: 100%;
            height: 250px;
            display: block;
            margin-bottom: 20px;
            border: 2px solid white;
            cursor: pointer;
        }

        .instructions {
            font-size: 0.9rem;
            margin-bottom: 20px;
            color: #2ecc71;
            text-transform: uppercase;
        }

        .btn {
            background: #2ecc71;
            padding: 15px 40px;
            font-size: 1.5rem;
            border-radius: 10px;
            border: none;
            border-bottom: 5px solid #27ae60;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn:active {
            transform: translateY(4px);
            border-bottom-width: 1px;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>
<body>

    <div class="menu-container">
        <h1 class="title">TUTORIAL</h1>
        <p class="instructions">Presiona ESPACIO o TOCA para saltar</p>
        
        <!-- Lienzo del juego -->
        <canvas id="gameCanvas"></canvas>

        <div class="secondary-btns">
            <button class="btn" onclick="resetGame()">REINTENTAR</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Ajustar resolución
        canvas.width = 600;
        canvas.height = 250;

        // Variables del jugador (el cubo)
        let player = {
            x: 50,
            y: 200,
            width: 30,
            height: 30,
            color: '#00f2ff',
            dy: 0,
            jumpForce: 12,
            gravity: 0.6,
            grounded: false,
            rotation: 0
        };

        // Obstáculos
        let obstacles = [];
        let gameSpeed = 5;
        let score = 0;
        let isGameOver = false;

        // Bucle principal
        function update() {
            if (isGameOver) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Aplicar gravedad
            player.dy += player.gravity;
            player.y += player.dy;

            // Suelo simple
            if (player.y + player.height > canvas.height - 20) {
                player.y = canvas.height - 20 - player.height;
                player.dy = 0;
                player.grounded = true;
                player.rotation = 0; // Reset rotación al tocar suelo
            } else {
                player.grounded = false;
                player.rotation += 5; // Rotar mientras salta
            }

            // Dibujar Jugador (Cubo con rotación)
            ctx.save();
            ctx.translate(player.x + player.width/2, player.y + player.height/2);
            ctx.rotate(player.rotation * Math.PI / 180);
            ctx.fillStyle = player.color;
            ctx.fillRect(-player.width/2, -player.height/2, player.width, player.height);
            ctx.strokeStyle = "white";
            ctx.strokeRect(-player.width/2, -player.height/2, player.width, player.height);
            ctx.restore();

            // Generar obstáculos (triángulos tipo spike)
            if (Math.random() < 0.02) {
                obstacles.push({ x: canvas.width, width: 30, height: 30 });
            }

            // Dibujar y mover obstáculos
            ctx.fillStyle = "#ff4d4d";
            obstacles.forEach((obs, index) => {
                obs.x -= gameSpeed;

                // Dibujar triángulo
                ctx.beginPath();
                ctx.moveTo(obs.x, canvas.height - 20);
                ctx.lineTo(obs.x + obs.width / 2, canvas.height - 20 - obs.height);
                ctx.lineTo(obs.x + obs.width, canvas.height - 20);
                ctx.fill();

                // Colisión simple
                if (player.x < obs.x + obs.width &&
                    player.x + player.width > obs.x &&
                    player.y + player.height > canvas.height - 20 - obs.height) {
                    gameOver();
                }

                // Borrar obstáculos fuera de pantalla
                if (obs.x + obs.width < 0) obstacles.splice(index, 1);
            });

            // Dibujar línea de suelo
            ctx.strokeStyle = "white";
            ctx.beginPath();
            ctx.moveTo(0, canvas.height - 20);
            ctx.lineTo(canvas.width, canvas.height - 20);
            ctx.stroke();

            requestAnimationFrame(update);
        }

        function jump() {
            if (player.grounded && !isGameOver) {
                player.dy = -player.jumpForce;
                player.grounded = false;
            }
        }

        function gameOver() {
            isGameOver = true;
            ctx.fillStyle = "white";
            ctx.font = "30px GeometryDash";
            ctx.fillText("¡CRASH!", canvas.width/2 - 60, canvas.height/2);
        }

        function resetGame() {
            player.y = 200;
            player.dy = 0;
            obstacles = [];
            isGameOver = false;
            update();
        }

        // --- CONTROLES ---
        
        // Teclado (PC)
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') jump();
        });

        // Pantalla (Móvil / Mouse)
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            jump();
        });
        canvas.addEventListener('mousedown', jump);

        // Iniciar
        update();
    </script>
</body>
</html>
