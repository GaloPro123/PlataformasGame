<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Tower Game - Inicio</title>
    <link rel="stylesheet" href="style.css">
    <!-- Fuente tipo gaming -->
    <link href="https://fonts.cdnfonts.com/css/pusab" rel="stylesheet">
</head>
<body>
    <!-- Capa para el efecto de brillo/partículas de fondo -->
    


    <div class="overlay"></div>
    <audio id="miAudio" src="Intro.mp3" loop></audio>

    <main class="menu-container">
        <header>
            <h1 class="title">The Tower Game</h1>
            <p class="subtitle">Presiona Play para comenzar</p>
        </header>

        <nav class="menu-options">
            <a href="level-tut.html" class="btn play-btn">PLAY</a>
            <div class="secondary-btns">
                <a href="opciones.html" class="btn small-btn">OPCIONES</a>
                <a href="#" class="btn small-btn">CRÉDITOS</a>
            </div>
        </nav>
    </main>

    <footer class="footer">
        v1.0.2 - Creado por GaloPro123. (Desarrollador, Oliver).
    </footer>
    <script>
  // Escuchamos el primer clic en cualquier parte del documento
  document.addEventListener('click', function() {
    var audio = document.getElementById("miAudio");
    
    // Intentamos reproducir el audio
    audio.play().catch(function(error) {
      console.log("El navegador bloqueó el autoplay inicialmente:", error);
    });
  }, { once: true }); // '{ once: true }' hace que el evento solo se ejecute la primera vez
</script>
</body>
</html>
