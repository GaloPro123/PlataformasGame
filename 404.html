<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Level Not Found</title>
    <style>
        /* Tu CSS integrado */
        @font-face { font-family: 'GeometryDash'; src: url('Letras.otf') format('opentype'); }
        
        * { 
            text-decoration: none; 
            font-family: 'GeometryDash', 'Pusab', sans-serif; 
            box-sizing: border-box;
        }

        body { 
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            overflow: hidden; 
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab); 
            background-size: 400% 400%; 
            animation: gradientBG 15s ease infinite; 
            color: white; 
            margin: 0;
        }

        @keyframes gradientBG { 
            0% { background-position: 0% 50%; } 
            50% { background-position: 100% 50%; } 
            100% { background-position: 0% 50%; } 
        }

        .menu-container { 
            text-align: center; 
            z-index: 10; 
            background: rgba(0, 0, 0, 0.3); 
            padding: 50px; 
            border-radius: 20px; 
            border: 4px solid rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(5px); 
            max-width: 90%;
        }

        .title { 
            font-size: 4rem; 
            color: #fff; 
            text-shadow: 0 5px 0 #2980b9, 0 10px 0 #1c5980, 0 15px 20px rgba(0,0,0,0.5); 
            letter-spacing: 5px; 
            margin-bottom: 10px; 
            animation: float 3s ease-in-out infinite; 
        }

        .subtitle { 
            font-size: 1.5rem; 
            margin-bottom: 40px; 
            opacity: 0.9; 
            display: block;
        }

        .btn { 
            text-decoration: none; 
            color: white; 
            display: inline-block; 
            transition: all 0.2s; 
            cursor: pointer; 
            border: none;
        }

        .play-btn { 
            background: #2ecc71; 
            padding: 20px 60px; 
            font-size: 2rem; 
            border-radius: 15px; 
            border-bottom: 8px solid #27ae60; 
            margin-bottom: 20px; 
            display: inline-block;
        }

        .play-btn:hover { transform: scale(1.1); background: #27ae60; }
        .play-btn:active { transform: translateY(4px); border-bottom-width: 2px; }

        .secondary-btns { 
            display: flex; 
            gap: 15px; 
            justify-content: center; 
            margin-top: 20px;
        }

        .small-btn { 
            background: #34495e; 
            padding: 12px 25px; 
            font-size: 1rem; 
            border-radius: 8px; 
            border-bottom: 4px solid #2c3e50; 
        }

        .small-btn:hover { background: #4a627a; }

        @keyframes float { 
            0%, 100% { transform: translateY(0); } 
            50% { transform: translateY(-15px); } 
        }

        .footer { position: absolute; bottom: 20px; font-size: 0.8rem; opacity: 0.6; }
    </style>
</head>
<body>

    <div class="menu-container">
        <h1 class="title">404</h1>
        <span class="subtitle">LEVEL NOT FOUND</span>
        
        <div class="main">
            <!-- Botón principal para volver al inicio -->
            <a href="https://galopro123.github.io/PlataformasGame/#" class="btn play-btn">RETRY</a>
            
            <div class="secondary-btns">
                <a href="selector" class="btn small-btn">LEVELS</a>
                <a href="options" class="btn small-btn">OPTIONS</a>
            </div>
        </div>
    </div>

    <div class="footer">
        Something went wrong... Back on track!
    </div>

</body>
</html>
